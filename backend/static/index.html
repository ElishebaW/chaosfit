<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaosFit</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/app.js" type="module"></script>
  </head>
  
  <body class="athletic-body">
    <!-- Connection Status HUD -->
    <div class="connection-hud">
      <span class="status-indicator" id="statusIndicator"></span>
      <span id="statusText">Connecting...</span>
    </div>

    <!-- Main Video Container - 80% height, cinematic hero -->
    <div class="video-container">
      <video id="cameraPreviewBg" autoplay playsinline muted class="hero-video hero-video-bg"></video>
      <video id="cameraPreview" autoplay playsinline muted class="hero-video"></video>
      
      <!-- HUD Overlays on Video -->
      
      <!-- Timer Widget - Top Right -->
      <div class="timer-hud">
        <div class="hud-display">
          <span id="timerDisplay">00:00</span>
          <span class="timer-label">ELAPSED</span>
        </div>
        <div class="hud-controls">
          <button id="pauseTimer" class="hud-btn">PAUSE</button>
          <button id="resetTimer" class="hud-btn">RESET</button>
        </div>
      </div>
      
      <!-- Rep Counter - Top Left -->
      <div class="rep-counter-hud">
        <div class="hud-display">
          <span id="repCount">0</span>
          <span class="rep-label">REPS</span>
        </div>
        <div class="hud-controls">
          <button id="incrementRep" class="hud-btn">+1</button>
          <button id="resetRep" class="hud-btn">RESET</button>
        </div>
      </div>
      
      <!-- Session Status - Top Center -->
      <div class="session-status-hud">
        <span id="sessionStatus" class="status-text">● OFFLINE</span>
      </div>
    </div>

    <!-- Coaching Log - Bottom 20% as footer overlay -->
    <div class="coaching-footer">
      <div class="coaching-header">
        <h2>COACHING FEEDBACK</h2>
      </div>
      
      <div class="coaching-messages" id="messages">
        <div class="waiting-message">Waiting for coaching feedback...</div>
      </div>
    </div>

    <!-- Session Controls - Above coaching log -->
    <div class="session-controls">
      <button id="startSessionBtn" class="control-btn session-btn">▶ START SESSION</button>
      <button id="stopSessionBtn" class="control-btn stop-btn" style="display:none;">⏹ END SESSION</button>
      <button id="pauseBtn" class="control-btn pause-btn" style="display:none;">⏸ PAUSE SESSION</button>
      <button id="resumeBtn" class="control-btn resume-btn" style="display:none;">▶ RESUME SESSION</button>
    </div>

    <div class="legacy-hidden" aria-hidden="true">
      <label>
        <input type="checkbox" id="enableProactivity">
        <span>Proactivity</span>
      </label>
      <label>
        <input type="checkbox" id="enableAffectiveDialog">
        <span>Affective Dialog</span>
      </label>

      <form id="messageForm">
        <input type="text" id="message" name="message" />
        <button type="submit" id="sendButton" disabled>Send</button>
        <button type="button" id="cameraButton">🎥 Start Video</button>
        <button type="button" id="pauseSessionButton">Pause Session</button>
        <button type="button" id="resumeSessionButton" disabled>Resume Session</button>
      </form>

      <div class="console-panel">
        <div class="console-header">
          <h2>Event Console</h2>
          <div class="console-controls">
            <label class="console-checkbox">
              <input type="checkbox" id="showAudioEvents">
              <span>Show audio</span>
            </label>
            <button id="clearConsole" class="console-clear-btn">Clear</button>
          </div>
        </div>
        <div id="consoleContent" class="console-content"></div>
      </div>

      <div id="videoPreviewPanel" class="hidden"></div>
    </div>

    <!-- Hidden Elements -->
    <div id="interruptionBanner" class="interruption-banner hidden">
      Safety correction issued. Coach interrupted for immediate feedback.
    </div>
    <div id="sessionPauseBanner" class="session-pause-banner hidden">
      Session paused.
    </div>
  </body>
</html>
