<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaosFit</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/app.js" type="module"></script>
  </head>
  
  <body class="athletic-body">
    <!-- Connection Status HUD -->
    <div class="connection-hud">
      <span class="status-indicator" id="statusIndicator"></span>
      <span id="statusText">Connecting...</span>
    </div>

    <!-- Main Video Container - 80% height, cinematic hero -->
    <div class="video-container">
      <video id="cameraPreviewBg" autoplay playsinline muted class="hero-video hero-video-bg"></video>
      <video id="cameraPreview" autoplay playsinline muted class="hero-video"></video>
      
      <!-- HUD Overlays on Video -->
      
      <!-- Timer Widget - Top Right -->
      <div class="timer-hud">
        <div class="hud-display">
          <span id="timerDisplay">00:00</span>
          <span class="timer-label">ELAPSED</span>
        </div>
        <div class="hud-controls">
          <button id="pauseTimer" class="hud-btn">PAUSE</button>
          <button id="resetTimer" class="hud-btn">RESET</button>
        </div>
      </div>
      
      <!-- Rep Counter - Top Left -->
      <div class="rep-counter-hud">
        <div class="hud-display">
          <span id="repCount">0</span>
          <span class="rep-label">REPS</span>
        </div>
        <div class="hud-controls">
          <button id="incrementRep" class="hud-btn">+1</button>
          <button id="resetRep" class="hud-btn">RESET</button>
        </div>
      </div>
      
      <!-- Form-cue overlay canvas -->
      <canvas id="formCueCanvas" class="form-cue-canvas" aria-hidden="true"></canvas>

      <!-- Session Status - Top Center -->
      <div class="session-status-hud">
        <span id="sessionStatus" class="status-text">● OFFLINE</span>
      </div>
    </div>

    <!-- Coaching Log - Bottom 20% as footer overlay -->
    <div class="coaching-footer">
      <div class="coaching-header">
        <h2>COACHING FEEDBACK</h2>
      </div>
      
      <div class="coaching-messages" id="messages">
        <div class="waiting-message">Waiting for coaching feedback...</div>
      </div>
    </div>

    <!-- Session Controls - Above coaching log -->
    <div class="session-controls">
      <button id="startSession" class="control-btn session-btn" disabled>START SESSION</button>
      <button id="pauseSession" class="control-btn pause-btn" style="display: none;">PAUSE</button>
      <button id="resumeSession" class="control-btn resume-btn" style="display: none;">RESUME</button>
      <button id="stopSession" class="control-btn stop-btn" style="display: none;">END SESSION</button>
    </div>

    <div class="legacy-hidden" aria-hidden="true">
      <label>
        <input type="checkbox" id="enableProactivity">
        <span>Proactivity</span>
      </label>
      <label>
        <input type="checkbox" id="enableAffectiveDialog">
        <span>Affective Dialog</span>
      </label>

      <form id="messageForm">
        <input type="text" id="message" name="message" />
        <button type="submit" id="sendButton" disabled>Send</button>
        <button type="button" id="cameraButton">🎥 Start Video</button>
        <button type="button" id="pauseSessionButton">Pause Session</button>
        <button type="button" id="resumeSessionButton" disabled>Resume Session</button>
      </form>

      <div class="console-panel">
        <div class="console-header">
          <h2>Event Console</h2>
          <div class="console-controls">
            <label class="console-checkbox">
              <input type="checkbox" id="showAudioEvents">
              <span>Show audio</span>
            </label>
            <button id="clearConsole" class="console-clear-btn">Clear</button>
          </div>
        </div>
        <div id="consoleContent" class="console-content"></div>
      </div>

      <div id="videoPreviewPanel" class="hidden"></div>
    </div>

    <!-- Hidden Elements -->
    <!-- Pre-session Setup Overlay -->
    <div id="setupOverlay" class="setup-overlay" aria-modal="true" role="dialog" aria-label="Session setup">
      <div class="setup-card">
        <div class="setup-header">
          <h1 class="setup-title">CHAOSFIT</h1>
          <p class="setup-subtitle">Build your session</p>
        </div>
        <form id="setupForm" class="setup-form" novalidate>

          <div class="setup-field">
            <label class="setup-label" for="goalInput">What's your goal today?</label>
            <input type="text" id="goalInput" class="setup-input" placeholder="e.g. quick cardio, build strength" maxlength="80" autocomplete="off">
          </div>

          <div class="setup-field">
            <label class="setup-label">How long do you have? <span id="durationDisplay" class="setup-value">20</span> min</label>
            <input type="range" id="durationInput" class="setup-range" min="5" max="60" step="5" value="20">
            <div class="setup-range-labels"><span>5 min</span><span>60 min</span></div>
          </div>

          <div class="setup-field">
            <label class="setup-label">Available space?</label>
            <div class="setup-options" id="spaceOptions">
              <button type="button" class="setup-option-btn" data-value="small">Tight spot</button>
              <button type="button" class="setup-option-btn active" data-value="medium">Bedroom</button>
              <button type="button" class="setup-option-btn" data-value="full">Full room</button>
            </div>
          </div>

          <div class="setup-field">
            <label class="setup-label">How are you feeling? <span id="energyLabel" class="setup-value">Neutral</span></label>
            <div class="setup-options" id="energyOptions">
              <button type="button" class="setup-energy-btn" data-value="1">1</button>
              <button type="button" class="setup-energy-btn" data-value="2">2</button>
              <button type="button" class="setup-energy-btn active" data-value="3">3</button>
              <button type="button" class="setup-energy-btn" data-value="4">4</button>
              <button type="button" class="setup-energy-btn" data-value="5">5</button>
            </div>
            <div class="setup-range-labels"><span>Exhausted</span><span>Energized</span></div>
          </div>

          <button type="submit" id="setupSubmitBtn" class="setup-submit-btn" disabled>LET'S GO</button>
        </form>
      </div>
    </div>

    <div id="latencyWarningBanner" class="latency-warning-banner hidden"></div>
    <div id="interruptionBanner" class="interruption-banner hidden">
      Safety correction issued. Coach interrupted for immediate feedback.
    </div>
    <div id="sessionPauseBanner" class="session-pause-banner hidden">
      Session paused.
    </div>
  </body>
</html>
